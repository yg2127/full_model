seed: 42
device: cuda

paths:
  dmd_root: /data/shared/DMD
  pose_root: /data/shared/DMD_landmarks/yolo_pose

  # Clean FaceMesh / YOLO-face 5pt canonical features
  face_root: /data/shared/Occlusion_subset_dataset/region_occlusion_video_dataset_v3_original_fixedmask_yolo_face_facemesh_canonical/facemesh
  face5pt_root: /data/shared/Occlusion_subset_dataset/region_occlusion_video_dataset_v3_original_fixedmask_yolo_face_facemesh_canonical/yolo_face

  frame_shifts: /data/shared/scuppy/hyi/Ablation/Ablation_ex_Gaze_clean_to_clean/constants/frame_shifts.json
  fixed_items_json: /data/shared/scuppy/hyi/fixed_splits/dms_clean_masked_fixed_items_v1.json

  save_root: /data/shared/scuppy/hyi/Ablation/Ablation_ex_Gaze_clean_to_clean/artifacts/gaze_clean_to_clean_seed42
  results_root: /data/shared/scuppy/hyi/Ablation/Ablation_ex_Gaze_clean_to_clean/results

# Clean FaceMesh upper-bound experiment: no occlusion feature, no OCC fusion.
occ:
  enabled: false
  mode: none
  dim: 0
  face_npz_to_occ_npz: null
  use_computed_only: false
  default_visible_prob: 1.0
  default_crop_valid: 1.0

data:
  # Gaze upper-bound only: use gaze session.
  use_distraction: false
  use_gaze: true
  distraction_sessions: []
  gaze_sessions:
    - s6

  clip_len: 50
  action_stride: 25
  gaze_stride: 25
  normal_ratio: 0.3

  use_fixed_items_manifest: true

  # Critical: clean only.
  train_variants:
    - clean
  val_variants:
    - clean
  test_variants:
    - clean

face:
  mode: facemesh_full
  num_landmarks: 478
  encoder: region_pool
  region_scheme: dms_10
  region_reduce: mean
  num_regions: 10

  use_z: true
  use_detected_channel: true
  use_det_score_channel: false
  bbox_det_thres: 0.25

pose:
  num_joints: 17
  joint_conf_thres: 0.2
  use_bone: true
  use_velocity: true
  use_conf_channel: true

window:
  size: 48
  stride: 24
  max_per_clip: null

  pose_min_valid_frames: 16
  pose_min_valid_ratio: 0.35
  pose_min_valid_joint_ratio: 0.15
  face_min_detected_ratio: 0.2

split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

model:
  pose_mid_channels: 128
  face_mid_channels: 128
  fused_channels: 256

  # No ablation variants. Plain concat baseline.
  fusion:
    kind: concat

  temporal:
    kind: identity
    num_heads: 4
    dropout: 0.1
    max_len: 8192

  dropout_backbone: 0.1
  dropout_head: 0.3

train:
  batch_size: 64
  num_workers: 8
  epochs: 50
  lr: 0.00075
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  patience: 8
  save_every_epoch: true
  resume: false
  resume_path: null

  # Gaze-only class weight.
  use_class_weight:
    action: false
    gaze: true
    hands: false
    talk: false

loss:
  # Gaze-only training objective.
  alpha_action: 0.0
  alpha_gaze: 1.0
  alpha_hands: 0.0
  alpha_talk: 0.0
  gaze_weak_weight: 0.0

best_score_weights:
  action: 0.0
  gaze: 1.0
  hands: 0.0
  talk: 0.0

eval:
  clip_agg_mode: topk_mean
  clip_topk: 3

notify:
  enabled: false
  script: /home/yg/code/claude/telegram-bot/train_notify.sh
  tag: gaze_clean_to_clean_seed42
  every_epoch: false
